<!DOCTYPE html>
<html>
<head>
  <title>Advanced AI Chatbot</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .dark {
      background: #121212;
      color: white;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: white;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .dark .chat-container {
      background: #1e1e1e;
    }

    .chat-header {
      background: #007bff;
      color: white;
      padding: 10px;
      display: flex;
      justify-content: space-between;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .bot {
      background: #eee;
    }

    .dark .bot {
      background: #333;
    }

    .chat-input {
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      cursor: pointer;
    }

    .mic {
      background: orange;
      color: white;
    }

    .send {
      background: #007bff;
      color: white;
    }

    .clear {
      background: red;
      color: white;
    }

  </style>

</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <span>AI Chatbot 🤖</span>
    <div>
      <button onclick="toggleMode()">🌙</button>
      <button class="clear" onclick="clearChat()">🗑️</button>
    </div>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type..." onkeypress="handleKey(event)">
    <button class="mic" onclick="startVoice()">🎤</button>
    <button class="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

let chatBox = document.getElementById("chatBox");

// Load chat
window.onload = () => {
  chatBox.innerHTML = localStorage.getItem("chat") || "";
};

// Save chat
function saveChat() {
  localStorage.setItem("chat", chatBox.innerHTML);
}

function handleKey(e) {
  if (e.key === "Enter") sendMessage();
}

// Send message
function sendMessage() {
  let input = document.getElementById("userInput");
  let msg = input.value.trim();
  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";

  setTimeout(() => {
    addMessage(getReply(msg), "bot");
  }, 700);
}

// Add message
function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  saveChat();
}

// Smart replies
function getReply(msg) {
  msg = msg.toLowerCase();

  if (msg.includes("hello") || msg.includes("hi"))
    return "Hello Prince Vikram Singh ji 😊";

  if (msg.includes("project"))
    return "Ye ek advanced frontend AI chatbot project hai 🔥";

  if (msg.includes("ai"))
    return "AI ka matlab Artificial Intelligence hota hai 🤖";

  if (msg.includes("bye"))
    return "Goodbye 👋";

  let arr = [
    "Nice 👍",
    "Samajh gaya 😊",
    "Aur batao...",
    "Interesting 🤔"
  ];

  return arr[Math.floor(Math.random() * arr.length)];
}

// Dark mode
function toggleMode() {
  document.body.classList.toggle("dark");
}

// Clear chat
function clearChat() {
  chatBox.innerHTML = "";
  localStorage.removeItem("chat");
}

// Voice input
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("userInput").value = event.results[0][0].transcript;
  };
}

</script>

</body>
</html>
